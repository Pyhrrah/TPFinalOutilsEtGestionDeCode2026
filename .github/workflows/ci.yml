name: CI Pipeline

on:
  push:
    branches: [ "prod", "dev" ]
  pull_request:
    branches: [ "prod", "dev" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json
    - run: npm install
    - run: npm run lint
    - run: npm run test:coverage

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
    - run: npm install
    - run: npm run test:coverage
    - run: npm run build